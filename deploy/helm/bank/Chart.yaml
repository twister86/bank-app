apiVersion: v2
name: bank
description: Bank — umbrella chart that deploys all microservices, their PostgreSQL StatefulSets, the front UI and Keycloak as one release.
type: application
version: 0.1.0
appVersion: "1.1.0"

dependencies:
  - name: accounts
    version: 0.1.0
    repository: "file://../accounts"
    condition: accounts.enabled

  - name: cash
    version: 0.1.0
    repository: "file://../cash"
    condition: cash.enabled

  - name: transfer
    version: 0.1.0
    repository: "file://../transfer"
    condition: transfer.enabled

  - name: notifications
    version: 0.1.0
    repository: "file://../notifications"
    condition: notifications.enabled

  - name: front-ui
    version: 0.1.0
    repository: "file://../front-ui"
    condition: front-ui.enabled

  - name: keycloak-realm
    version: 0.1.0
    repository: "file://../keycloak-realm"
    condition: keycloak.enabled

  # Bitnami Keycloak — production-grade chart with built-in StatefulSet,
  # Postgres dependency, ingress and realm-import support. We let it own
  # its database too (postgresql.enabled=true).
  - name: keycloak
    version: 24.4.5
    repository: "https://charts.bitnami.com/bitnami"
    condition: keycloak.enabled
