apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-front-ui-test"
  labels:
    app.kubernetes.io/name: front-ui-test
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: bank
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: probe
      image: curlimages/curl:8.5.0
      command:
        - sh
        - -ec
        - |
          for i in $(seq 1 30); do
            if curl -fsS http://front-ui:8080/actuator/health/readiness; then
              echo
              echo "==> front-ui is ready"
              exit 0
            fi
            sleep 2
          done
          echo "front-ui did not become ready in time"
          exit 1