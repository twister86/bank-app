spring:
  application:
    name: notifications-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8081/realms/my-bank}
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:http://localhost:8081/realms/my-bank/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    ru.yandex.practicum.notifications: ${LOGGING_LEVEL_APP:INFO}