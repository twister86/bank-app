spring:
  application:
    name: front

  thymeleaf:
    cache: ${SPRING_THYMELEAF_CACHE:true}

  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${OAUTH2_CLIENT_ID:front-client}
            client-secret: ${OAUTH2_CLIENT_SECRET:front-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
              - accounts.read
              - accounts.write
              - cash.write
              - transfer.write
        provider:
          keycloak:
            issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8081/realms/my-bank}
            user-name-attribute: preferred_username

server:
  port: ${SERVER_PORT:8085}

bank:
  services:
    accounts:
      url: ${BANK_SERVICES_ACCOUNTS_URL:http://localhost:8080}
    cash:
      url: ${BANK_SERVICES_CASH_URL:http://localhost:8082}
    transfer:
      url: ${BANK_SERVICES_TRANSFER_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    ru.yandex.practicum.front: ${LOGGING_LEVEL_APP:INFO}