server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: accounts-route
              uri: lb://accounts-service
              predicates:
                - Path=/api/accounts/**
              filters:
                - StripPrefix=1
                - TokenRelay=
            - id: cash-route
              uri: lb://cash-service
              predicates:
                - Path=/api/cash/**
              filters:
                - StripPrefix=1
                - TokenRelay=
            - id: transfer-route
              uri: lb://transfer-service
              predicates:
                - Path=/api/transfer/**
              filters:
                - StripPrefix=1
                - TokenRelay=
  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: gateway-client
            client-secret: ${GATEWAY_CLIENT_SECRET:gateway-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - accounts.read
              - accounts.write
              - cash.write
              - transfer.write
        provider:
          keycloak:
            authorization-uri: ${keycloak.issuer-uri-external}/protocol/openid-connect/auth
            token-uri: ${keycloak.issuer-uri-internal}/protocol/openid-connect/token
            jwk-set-uri: ${keycloak.issuer-uri-internal}/protocol/openid-connect/certs
            user-info-uri: ${keycloak.issuer-uri-internal}/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG