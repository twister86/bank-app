# Централизованный конфиг для accounts-service
# (читается Config Server'ом из classpath:/configs/accounts-service.yml)

server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bank}?currentSchema=accounts
    username: ${DB_USER:bank}
    password: ${DB_PASSWORD:bank}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: accounts
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml
    default-schema: accounts
    liquibase-schema: accounts

# Accounts больше НЕ делает исходящих вызовов в другие сервисы:
# уведомления об операциях шлют вызывающие сервисы (cash / transfer),
# которые знают бизнес-контекст. Поэтому OAuth2 Client здесь не нужен —
# только Resource Server из application.yml для валидации входящих JWT.
