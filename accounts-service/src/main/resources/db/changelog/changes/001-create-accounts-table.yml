databaseChangeLog:
  - changeSet:
      id: 001-create-accounts-table
      author: nikolai
      changes:
        - createTable:
            tableName: accounts
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: login
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: birthdate
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: balance
                  type: NUMERIC(19,2)
                  constraints:
                    nullable: false
                  defaultValueNumeric: 0
              - column:
                  name: version
                  type: BIGINT
                  constraints:
                    nullable: false
                  defaultValueNumeric: 0
        - createIndex:
            indexName: idx_accounts_login
            tableName: accounts
            unique: true
            columns:
              - column:
                  name: login
